<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Login — Alaa Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #1c0f07 0%, #3d2010 50%, #6b4226 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: rgba(245,240,232,0.95);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    }
    .login-logo { text-align: center; font-size: 2.5rem; margin-bottom: 8px; }
    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: #3d2010;
      text-align: center;
      margin-bottom: 4px;
    }
    .login-subtitle { text-align: center; color: #9a8068; font-size: 0.88rem; margin-bottom: 36px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: #6b4226; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
    .form-group input {
      width: 100%;
      padding: 13px 16px;
      border: 1px solid rgba(107,66,38,0.2);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: #2a1a0a;
      background: #fffdf8;
      outline: none;
      transition: border-color 0.25s;
    }
    .form-group input:focus { border-color: #c9974a; box-shadow: 0 0 0 3px rgba(201,151,74,0.15); }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3d2010, #6b4226);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(61,32,16,0.3); }
    .error-msg { background: #fee; border: 1px solid #fbb; border-radius: 10px; padding: 10px 16px; color: #c0392b; font-size: 0.88rem; margin-bottom: 16px; display: none; }
    .back-link { text-align: center; margin-top: 20px; font-size: 0.88rem; color: #9a8068; }
    .back-link a { color: #c9974a; font-weight: 600; }
    .hint { font-size: 0.78rem; color: #b0907a; text-align: center; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">☕</div>
    <h1 class="login-title">Admin Panel</h1>
    <p class="login-subtitle">Manage your portfolio content</p>
    <div class="error-msg" id="errorMsg"><i class="fa-solid fa-circle-exclamation"></i> Invalid email or password.</div>
    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn-login">Login <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
    </form>
    <p class="hint">Default: alaa.muhamed120@icloud.com / alaa2024</p>
    <p class="back-link"><a href="index.html">← Back to Portfolio</a></p>
  </div>
  <script>
    // Check already logged in
    if (sessionStorage.getItem('adminLoggedIn') === 'true') {
      window.location.href = 'admin-dashboard.html';
    }

    const ADMIN_CREDENTIALS = {
      email: 'alaa.muhamed120@icloud.com',
      password: 'alaa2024'
    };

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const pass  = document.getElementById('loginPassword').value;
      const err   = document.getElementById('errorMsg');

      if (email === ADMIN_CREDENTIALS.email && pass === ADMIN_CREDENTIALS.password) {
        sessionStorage.setItem('adminLoggedIn', 'true');
        window.location.href = 'admin-dashboard.html';
      } else {
        err.style.display = 'block';
        setTimeout(() => err.style.display = 'none', 3000);
      }
    });
  </script>
</body>
</html>
